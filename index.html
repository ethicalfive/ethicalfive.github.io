<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filesystem Manager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: system-ui, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:active { opacity: 0.8; }
        button.danger { background: #dc3545; padding: 6px 12px; font-size: 12px; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .file-card { background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .preview { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; background: #000; margin-bottom: 10px; }
        .file-name { font-size: 11px; text-align: center; word-break: break-all; margin-bottom: 10px; height: 32px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Storage Manager</h2>
        <button onclick="pickFolder()">📂 Open Folder</button>
    </div>

    <div id="fileGrid" class="gallery">
        <p style="color: #666;">Tap "Open Folder" to manage files.</p>
    </div>

    <script>
        // Register PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let rootHandle = null;

        async function pickFolder() {
            try {
                // Requesting directory access
                rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                refreshGrid();
            } catch (err) {
                console.error("Access denied:", err);
            }
        }

        async function refreshGrid() {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = '';

            if (!rootHandle) return;

            for await (const entry of rootHandle.values()) {
                const card = document.createElement('div');
                card.className = 'file-card';

                // Handle Files
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    
                    // Create Preview for Images/Videos
                    if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
                        const media = document.createElement(file.type.startsWith('image/') ? 'img' : 'video');
                        media.className = 'preview';
                        media.src = URL.createObjectURL(file);
                        card.appendChild(media);
                    } else {
                        const placeholder = document.createElement('div');
                        placeholder.className = 'preview';
                        placeholder.style.display = 'flex';
                        placeholder.style.justifyContent = 'center';
                        placeholder.style.alignItems = 'center';
                        placeholder.innerText = '📄';
                        card.appendChild(placeholder);
                    }

                    const name = document.createElement('div');
                    name.className = 'file-name';
                    name.innerText = entry.name;
                    card.appendChild(name);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'danger';
                    delBtn.innerText = 'Delete';
                    delBtn.onclick = async () => {
                        if (confirm(`Permanent delete ${entry.name}?`)) {
                            await rootHandle.removeEntry(entry.name);
                            refreshGrid();
                        }
                    };
                    card.appendChild(delBtn);
                    grid.appendChild(card);
                }
            }
        }
    </script>
</body>
</html>

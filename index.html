<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Manager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        .gallery img, .gallery video { width: 100%; border-radius: 8px; border: 1px solid #333; }
        .controls { background: #1e1e1e; padding: 15px; border-radius: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>Media Manager PWA</h1>
        <input type="file" id="filePicker" accept="image/*,video/*" hidden>
        <button onclick="document.getElementById('filePicker').click()">Import Image/Video</button>
        <button onclick="loadGallery()">Refresh Gallery</button>
    </div>

    <div class="gallery" id="gallery"></div>

    <script>
        // Register the Service Worker for PWA functionality
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const filePicker = document.getElementById('filePicker');
        const gallery = document.getElementById('gallery');

        // SAVE FILE TO OPFS
        filePicker.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const root = await navigator.storage.getDirectory();
            const fileHandle = await root.getFileHandle(file.name, { create: true });
            const writable = await fileHandle.createWritable();
            
            await writable.write(file);
            await writable.close();
            alert('Saved to private storage!');
            loadGallery();
        });

        // LOAD FILES FROM OPFS
        async function loadGallery() {
            gallery.innerHTML = '';
            const root = await navigator.storage.getDirectory();
            
            for await (const entry of root.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    const url = URL.createObjectURL(file);
                    
                    const element = file.type.startsWith('video') 
                        ? document.createElement('video') 
                        : document.createElement('img');
                    
                    element.src = url;
                    if (element.tagName === 'VIDEO') element.controls = true;
                    gallery.appendChild(element);
                }
            }
        }

        // Initial load
        loadGallery();
    </script>
</body>
</html>
